<!doctype html>
<!-- ↓enをjaに変更する -->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>WCB Cafe - MENU</title>
    <!-- ← タイトルを変更-->
    <meta
      name="description"
      content="ブレンドコーヒーとヘルシーなオーガニックフードを提供するカフェ"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ↓p216ファビコン -->
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <!-- ↓リセットCSSいまいちわかんない -->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <!-- ↓Googleフォントのリンクをコピペ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- ↓jsの拡大するやつ -->
    <link
      href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Hachi+Maru+Pop&family=Kaisei+Decol&family=M+PLUS+1:wght@100..900&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&family=Yuji+Mai&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/luminous-basic.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ↓背景画像のクラス -->
    <div class="sub-cover cover-menu">
      <!-- ← クラス名変更-->
      <header class="page-header wrapper">
        <!-- ← wrapper クラスを追加 p211-->
        <!-- ↓ロゴ画像がタイトルだけど、画像が表示されなかったときのためにタイトルとしてh1のクラスを設定↓-->
        <h1 class="align-center">
          <!-- ↓リンクを貼るためのaタグ -->
          <a href="index.html"
            ><img class="logo" src="images/logo.svg" alt="WCBカフェ ホーム"
          /></a>
          <!-- ↑フォトショでつくるロゴのピクセルサイズ目安をもう一度聞きたい -->
        </h1>
        <nav>
          <ul class="main-nav font-english">
            <!-- ↓メニュータブを増やしたらリンクのaタグも増やす -->
            <li><a href="news.html">News</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </header>
      <!-- ↓キャッチコピーのクラス -->
      <h2 class="page-title font-english">Menu</h2>
      <!-- ← 見出しを変更-->
    </div>
    <!-- ↓p258 wrapper（余白）grid（タイル並び）item（画像とテキスト）のクラス -->
    <main class="wrapper grid">
      <div class="item item-big">
        <!-- ← p264 item-big クラス追加 -->
        <!-- ↓jsの拡大するやつ グリッドギャラリーの追加とaタグで囲む-->
        <a class="grid-gallery" href="images/menu1.webp">
          <img src="images/menu1.webp" alt="" />
        </a>
        <p>アボカドトースト</p>
      </div>
      <div class="item">
        <a class="grid-gallery" href="images/menu2.webp">
          <img src="images/menu2.webp" alt="" />
        </a>
        <p>生ハムカプレーゼ</p>
      </div>
      <div class="item">
        <a class="grid-gallery" href="images/menu3.webp">
          <img src="images/menu3.webp" alt="" />
        </a>
        <p>ペンネボロネーゼ</p>
      </div>
      <div class="item">
        <a class="grid-gallery" href="images/menu4.webp">
          <img src="images/menu4.webp" alt="" />
        </a>
        <p>ムール貝のワイン蒸し</p>
      </div>
      <div class="item">
        <a class="grid-gallery" href="images/menu5.webp">
          <img src="images/menu5.webp" alt="" />
        </a>
        <p>根菜のグリル</p>
      </div>
      <div class="item">
        <a class="grid-gallery" href="images/menu6.webp">
          <img src="images/menu6.webp" alt="" />
        </a>
        <p>ジェノベーゼ</p>
      </div>
      <div class="item">
        <a class="grid-gallery" href="images/menu7.webp">
          <img src="images/menu7.webp" alt="" />
        </a>
        <p>ラザニア</p>
      </div>
      <div class="item">
        <a class="grid-gallery" href="images/menu8.webp">
          <img src="images/menu8.webp" alt="" />
        </a>
        <p>カプチーノ</p>
      </div>
      <div class="item">
        <a class="grid-gallery" href="images/menu9.webp">
          <img src="images/menu9.webp" alt="" />
        </a>
        <p>チョコブラウニー</p>
      </div>
    </main>

    <!-- ↓フッター部分のクラス -->
    <footer class="page-footer">
      <h3 class="heading-large font-english">Information</h3>
      <table class="info">
        <tr>
          <th>住所</th>
          <td>東京都港区六本木 0-0 ◯◯◯</td>
        </tr>
        <tr>
          <th>電話</th>
          <td>03-1111-XXXX</td>
        </tr>
        <tr>
          <th>営業時間</th>
          <td>10:00〜20:00</td>
        </tr>
        <tr>
          <th>店休日</th>
          <td>水曜</td>
        </tr>
      </table>
      <!-- ↓コピーライトの追加 -->
      <div class="copyright">
        <small>&copy; 2010 WCB Cafe</small>
      </div>
    </footer>
  </body>
  <!-- ↓jsの拡大するやつ -->
  <!-- JavaScript -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/luminous.min.js"></script>
  <script>
    new LuminousGallery(document.querySelectorAll(".grid-gallery"));
  </script>
</html>
